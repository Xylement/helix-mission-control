version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helix_secret_2024}
      POSTGRES_DB: helix_mc
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix -d helix_mc"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://helix:${POSTGRES_PASSWORD:-helix_secret_2024}@db:5432/helix_mc
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-helix_jwt_secret_change_me_in_production}
      ENVIRONMENT: production
      OPENCLAW_GATEWAY_URL: ws://172.17.0.1:18789
      OPENCLAW_GATEWAY_TOKEN: ee066700d4d66994447714edc63976514825f316ad9c161c
      CORS_ORIGINS: https://helix.galado.com.my,http://localhost:3000,http://72.60.232.46:3000
      HELIX_SERVICE_TOKEN: ba1850dbad92ce5a49b3d09683d1f3983ef930d89abb10a9b2e904cc19e35d8a
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      GA4_PROPERTY_ID: "357446757"
      GSC_SITE_URL: "sc-domain:galado.com.my"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/credentials/galado-ga4-gsc-service-account.json"
    volumes:
      - /home/helix/.openclaw/workspaces:/home/helix/.openclaw/workspaces
      - uploads-data:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: ""
    depends_on:
      - backend

volumes:
  pgdata:
  uploads-data:
